<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>¡566335006</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bar:#111;
  --bezel:#1a1a1a;
  --screen:#000;
  --bg:#000;
  --text:#fff;
  --border:#333;
}

body{
  margin:0;
  background:var(--bg);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:"Segoe UI","Apple Color Emoji","Segoe UI Emoji",system-ui,sans-serif;
  color:var(--text);
}

/* PATTERNS */
body.pattern-horizontal{background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-vertical{background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-diag-r{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 8px);}
body.pattern-diag-l{background-image:repeating-linear-gradient(-45deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 8px);}
body.pattern-check{background-image:linear-gradient(45deg,rgba(255,255,255,.04)25%,transparent 25%),linear-gradient(-45deg,rgba(255,255,255,.04)25%,transparent 25%);}
body.pattern-diamond{background-image:radial-gradient(circle,rgba(255,255,255,.04)1px,transparent 1px);background-size:12px 12px;}

/* BEZEL */
.bezel{
  width:900px;
  max-width:95vw;
  height:85vh;
  margin-top:2vh;
  background:var(--bezel);
  border:2px solid var(--border);
  display:flex;
  flex-direction:column;
}

.bezel.wide{width:1100px;}
.bezel.ultra{width:95vw;}

/* MENU */
.menu-bar{
  background:var(--bar);
  display:flex;
  padding:6px 10px;
  font-size:14px;
}

.menu-item{
  margin-right:20px;
  cursor:pointer;
  position:relative;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:22px;
  left:0;
  background:var(--screen);
  border:1px solid var(--border);
  display:none;
  flex-direction:column;
  min-width:180px;
  z-index:20;
}

/* SUBMENU */
.dropdown .submenu{
  position:absolute;
  top:0;
  left:100%;
  display:none;
  flex-direction:column;
}

.dropdown div{
  display:flex;
  justify-content:space-between;
  padding:6px 8px;
  position:relative;
}

.dropdown div:hover{background:#222;}
.dropdown div:hover > .submenu{display:flex;}

.check{opacity:0;}

/* EGG */
#egg{
  margin-left:auto;
  cursor:pointer;
  opacity:.5;
}
#egg:hover{opacity:1;}

/* TERMINAL */
#terminal{
  flex:1;
  background:var(--screen);
  padding:16px;
  overflow-y:auto;
  white-space:pre-wrap;
}

/* INPUT */
.input-bar{
  background:var(--screen);
  border-top:1px solid var(--border);
  padding:10px;
}

textarea{
  width:100%;
  height:70px;
  resize:none;
  background:#111;
  color:#fff;
  border:1px solid var(--border);
  padding:8px;
  box-sizing:border-box;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:var(--screen);
  border:1px solid var(--border);
  padding:15px;
  width:320px;
}

.btn{
  width:100%;
  margin-top:8px;
  padding:8px;
  background:#fff;
  color:#000;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bezel" id="bezel">

<div class="menu-bar">

<!-- FILE -->
<div class="menu-item" onclick="toggleMenu('fileMenu')">File
  <div id="fileMenu" class="dropdown">
    <div onclick="openFile()">Load</div>
    <div onclick="resetSession()">Reset</div>
  </div>
</div>

<!-- VIEW -->
<div class="menu-item" onclick="toggleMenu('viewMenu')">View
  <div id="viewMenu" class="dropdown">

    <!-- FLAVORS -->
    <div>Flavors ▸
      <div class="submenu">
        <div onclick="setFlavor('vanilla')" data-flavor="vanilla"><span>Vanilla</span><span class="check">✓</span></div>
        <div onclick="setFlavor('mint')" data-flavor="mint"><span>Mint</span><span class="check">✓</span></div>
        <div onclick="setFlavor('cocoa')" data-flavor="cocoa"><span>Cocoa</span><span class="check">✓</span></div>
        <div onclick="setFlavor('berry')" data-flavor="berry"><span>Berry</span><span class="check">✓</span></div>
        <div onclick="setFlavor('melon')" data-flavor="melon"><span>Melon</span><span class="check">✓</span></div>
        <div onclick="setFlavor('citrus')" data-flavor="citrus"><span>Citrus</span><span class="check">✓</span></div>
      </div>
    </div>

    <!-- PATTERNS -->
    <div>Patterns ▸
      <div class="submenu">
        <div onclick="setPattern('none')" data-pattern="none"><span>None</span><span class="check">✓</span></div>
        <div onclick="setPattern('horizontal')" data-pattern="horizontal"><span>Horizontal</span><span class="check">✓</span></div>
        <div onclick="setPattern('vertical')" data-pattern="vertical"><span>Vertical</span><span class="check">✓</span></div>
        <div onclick="setPattern('diag-r')" data-pattern="diag-r"><span>Diagonal R</span><span class="check">✓</span></div>
        <div onclick="setPattern('diag-l')" data-pattern="diag-l"><span>Diagonal L</span><span class="check">✓</span></div>
        <div onclick="setPattern('diamond')" data-pattern="diamond"><span>Diamonds</span><span class="check">✓</span></div>
        <div onclick="setPattern('check')" data-pattern="check"><span>Checkerboard</span><span class="check">✓</span></div>
      </div>
    </div>

    <!-- SCREEN -->
    <div>Screen ▸
      <div class="submenu">
        <div onclick="setScreen('standard')" data-screen="standard"><span>Standard</span><span class="check">✓</span></div>
        <div onclick="setScreen('wide')" data-screen="wide"><span>Wide</span><span class="check">✓</span></div>
        <div onclick="setScreen('ultra')" data-screen="ultra"><span>Ultrawide</span><span class="check">✓</span></div>
      </div>
    </div>

  </div>
</div>

<div id="egg">🥚</div>

</div>

<div id="terminal">Welcome to 566335006</div>

<div class="input-bar">
<textarea id="input" placeholder="Type command…" onkeydown="handleInput(event)"></textarea>
</div>

</div>

<!-- NOTICE -->
<div id="notice" class="modal">
  <div class="modal-content">
    <strong>Notice</strong>
    <p>Do not enter personal info. Outputs may vary.</p>
    <label><input type="checkbox" id="dontShow"> Don't show again</label>
    <button class="btn" onclick="dismissNotice()">Continue</button>
  </div>
</div>

<script>
/* MENU */
let activeMenu=null;

function toggleMenu(id){
  const el=document.getElementById(id);
  if(el.style.display==="flex"){
    el.style.display="none";
  }else{
    closeMenus();
    el.style.display="flex";
  }
}

function closeMenus(){
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.menu-bar')) closeMenus();
});

/* TERMINAL */
function append(t){
  const el=document.getElementById("terminal");
  el.textContent+="\n"+t;
  el.scrollTop=el.scrollHeight;
}

function handleInput(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    append("> "+e.target.value);
    append("...");
    e.target.value="";
  }
}

/* STATE */
let currentFlavor="vanilla";
let currentPattern="none";
let currentScreen="standard";

/* FLAVOR */
function setFlavor(f){
  currentFlavor=f;
  const root=document.documentElement;

  const map={
    vanilla:{bar:"#111",bezel:"#1a1a1a",screen:"#000",bg:"#000"},
    mint:{bar:"#052a1c",bezel:"#0b3f2c",screen:"#102f22",bg:"#02150d"},
    cocoa:{bar:"#2a1605",bezel:"#3f260b",screen:"#2f1f10",bg:"#140a02"},
    berry:{bar:"#051a2a",bezel:"#0b2a3f",screen:"#10222f",bg:"#020c15"},
    melon:{bar:"#2a0510",bezel:"#3f0b1f",screen:"#2f1018",bg:"#15020a"},
    citrus:{bar:"#2a1a05",bezel:"#3f2a0b",screen:"#2f2410",bg:"#140d02"}
  };

  root.style.setProperty('--bar',map[f].bar);
  root.style.setProperty('--bezel',map[f].bezel);
  root.style.setProperty('--screen',map[f].screen);
  root.style.setProperty('--bg',map[f].bg);

  updateChecks();
}

/* PATTERN */
function setPattern(p){
  currentPattern=p;
  document.body.className="";
  if(p!=="none") document.body.classList.add("pattern-"+p);
  updateChecks();
}

/* SCREEN */
function setScreen(s){
  currentScreen=s;
  const b=document.getElementById("bezel");
  b.classList.remove("wide","ultra");
  if(s==="wide") b.classList.add("wide");
  if(s==="ultra") b.classList.add("ultra");
  updateChecks();
}

/* CHECKS */
function updateChecks(){
  document.querySelectorAll('[data-flavor]').forEach(el=>{
    el.querySelector('.check').style.opacity=(el.dataset.flavor===currentFlavor)?1:0;
  });
  document.querySelectorAll('[data-pattern]').forEach(el=>{
    el.querySelector('.check').style.opacity=(el.dataset.pattern===currentPattern)?1:0;
  });
  document.querySelectorAll('[data-screen]').forEach(el=>{
    el.querySelector('.check').style.opacity=(el.dataset.screen===currentScreen)?1:0;
  });
}

/* NOTICE */
function showNotice(){
  if(localStorage.getItem("seen")) return;
  document.getElementById("notice").style.display="flex";
}
function dismissNotice(){
  if(document.getElementById("dontShow").checked){
    localStorage.setItem("seen","1");
  }
  document.getElementById("notice").style.display="none";
}
showNotice();

/* INIT */
updateChecks();
</script>

</body>
</html>
