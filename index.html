<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Promptware Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bar:#111;
  --bezel:#1a1a1a;
  --screen:#000;
  --bg:#000;
  --text:#fff;
  --border:#333;
}

body{
  margin:0;
  background:var(--bg);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:"Segoe UI","Apple Color Emoji","Segoe UI Emoji",system-ui,sans-serif;
  color:var(--text);
}

/* PATTERNS */
body.pattern-horizontal{background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-vertical{background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-diagonal{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 8px);}
body.pattern-dots{background-image:radial-gradient(circle,rgba(255,255,255,.05)1px,transparent 1px);background-size:12px 12px;}
body.pattern-chevron{
  background-image:
    linear-gradient(135deg, rgba(255,255,255,.04) 25%, transparent 25%),
    linear-gradient(225deg, rgba(255,255,255,.04) 25%, transparent 25%);
  background-size:16px 16px;
}

/* BEZEL */
.bezel{
  width:900px;
  max-width:95vw;
  height:85vh;
  margin-top:2vh;
  background:var(--bezel);
  border:2px solid var(--border);
  display:flex;
  flex-direction:column;
}
.bezel.wide{width:1100px;}
.bezel.ultra{width:95vw;}

/* MENU */
.menu-bar{
  background:var(--bar);
  display:flex;
  padding:6px 10px;
  font-size:14px;
  align-items:center;
}

.menu-item{
  margin-right:20px;
  cursor:pointer;
  position:relative;
}

.system-label{
  margin-left:auto;
  font-weight:bold;
  margin-right:10px;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:22px;
  left:0;
  background:var(--screen);
  border:1px solid var(--border);
  display:none;
  flex-direction:column;
  min-width:180px;
  z-index:50;
}

.dropdown-item{
  padding:6px 10px;
  white-space:nowrap;
  position:relative;
}

.dropdown-item:hover{
  background:#222;
}

/* SUBMENU (FIXED) */
.submenu{
  position:absolute;
  top:0;
  left:100%;
  background:var(--screen);
  border:1px solid var(--border);
  display:none;
  flex-direction:column;
  min-width:160px;
}

.dropdown-item:hover > .submenu{
  display:flex;
}

/* TERMINAL */
#terminal{
  flex:1;
  background:var(--screen);
  padding:16px;
  overflow-y:auto;
}

/* INPUT */
.input-bar{
  display:flex;
  gap:8px;
  padding:10px;
  border-top:1px solid var(--border);
}

textarea{
  flex:1;
  height:70px;
  resize:none;
  background:#111;
  color:#fff;
  border:1px solid var(--border);
  padding:8px;
}

button{
  width:80px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:var(--screen);
  border:1px solid var(--border);
  padding:20px;
  width:320px;
}
</style>
</head>

<body>

<div class="bezel" id="bezel">

<div class="menu-bar">

<div class="menu-item" onclick="toggleMenu('fileMenu')">File
  <div id="fileMenu" class="dropdown">
    <div class="dropdown-item" onclick="openLoad()">Load</div>
    <div class="dropdown-item" onclick="resetSession()">Reset</div>
  </div>
</div>

<div class="menu-item" onclick="toggleMenu('viewMenu')">View
  <div id="viewMenu" class="dropdown">

    <div class="dropdown-item">Flavors
      <div class="submenu">
        <div class="dropdown-item" onclick="setFlavor('vanilla')">Vanilla</div>
        <div class="dropdown-item" onclick="setFlavor('mint')">Mint</div>
        <div class="dropdown-item" onclick="setFlavor('cocoa')">Cocoa</div>
        <div class="dropdown-item" onclick="setFlavor('berry')">Berry</div>
        <div class="dropdown-item" onclick="setFlavor('melon')">Melon</div>
        <div class="dropdown-item" onclick="setFlavor('citrus')">Citrus</div>
      </div>
    </div>

    <div class="dropdown-item">Patterns
      <div class="submenu">
        <div class="dropdown-item" onclick="setPattern('none')">None</div>
        <div class="dropdown-item" onclick="setPattern('horizontal')">Horizontal</div>
        <div class="dropdown-item" onclick="setPattern('vertical')">Vertical</div>
        <div class="dropdown-item" onclick="setPattern('diagonal')">Diagonal</div>
        <div class="dropdown-item" onclick="setPattern('dots')">Dots</div>
        <div class="dropdown-item" onclick="setPattern('chevron')">Chevron</div>
      </div>
    </div>

    <div class="dropdown-item">Screen
      <div class="submenu">
        <div class="dropdown-item" onclick="setScreen('standard')">Standard</div>
        <div class="dropdown-item" onclick="setScreen('wide')">Wide</div>
        <div class="dropdown-item" onclick="setScreen('ultra')">Ultrawide</div>
      </div>
    </div>

  </div>
</div>

<div class="menu-item" onclick="openHelp()">Help</div>

<div class="system-label">566335006</div>
<div id="egg">🥚</div>

</div>

<div id="terminal"></div>

<div class="input-bar">
<textarea id="input" disabled placeholder="Load a prompt to begin…"></textarea>
<button onclick="send()">Send</button>
</div>

</div>

<!-- LOAD MODAL -->
<div id="loadModal" class="modal">
  <div class="modal-content">
    <div style="margin-bottom:10px;">Select Prompt</div>
    <button onclick="loadPrompt()">Default Prompt</button>
    <button id="gooseBtn" style="display:none;" onclick="loadGoose()">Goose Sweeper</button>
    <button onclick="closeModal('loadModal')">Close</button>
  </div>
</div>

<!-- HELP MODAL -->
<div id="helpModal" class="modal">
  <div class="modal-content">
    <div style="margin-bottom:10px;">Promptware Terminal</div>
    <div style="margin-bottom:10px;">Load a prompt to begin.</div>
    <button onclick="closeModal('helpModal')">Close</button>
  </div>
</div>

<!-- GOOSE MODAL -->
<div id="gooseModal" class="modal">
  <div class="modal-content">
    <div style="margin-bottom:10px;">Goose Sweeper Unlocked</div>
    <button onclick="loadGoose()">Load Goose Sweeper</button>
    <button onclick="closeModal('gooseModal')">Close</button>
  </div>
</div>

<script>
/* MENU CONTROL */
function toggleMenu(id){
  closeMenus();
  document.getElementById(id).style.display="flex";
}
function closeMenus(){
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.menu-bar')) closeMenus();
});

/* TERMINAL */
function appendUser(t){
  document.getElementById("terminal").innerHTML += `<div style="text-align:right;">${t}</div>`;
}
function appendLLM(t){
  document.getElementById("terminal").innerHTML += `<div>${t}</div>`;
}

function send(){
  let input=document.getElementById("input");
  if(input.disabled) return;
  appendUser(input.value);
  appendLLM("...");
  input.value="";
}

/* MODALS */
function openLoad(){ document.getElementById("loadModal").style.display="flex"; }
function openHelp(){ document.getElementById("helpModal").style.display="flex"; }
function closeModal(id){ document.getElementById(id).style.display="none"; }

/* LOAD */
function loadPrompt(){
  closeModal("loadModal");
  appendLLM("Prompt loaded.");
  document.getElementById("input").disabled=false;
}
function loadGoose(){
  closeModal("gooseModal");
  appendLLM("Goose Sweeper started.");
  document.getElementById("input").disabled=false;
}

/* RESET */
function resetSession(){
  document.getElementById("terminal").innerHTML="";
  document.getElementById("input").disabled=true;
}

/* EGG */
let clicks=0;
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function tap(){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.frequency.value=700;
  g.gain.value=0.03;
  o.connect(g).connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),25);
}

function whack(){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.frequency.value=120;
  g.gain.value=0.1;
  o.connect(g).connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

document.getElementById("egg").onclick=()=>{
  if(ctx.state==="suspended") ctx.resume();
  clicks++;
  tap();
  if(clicks===99){
    whack();
    document.getElementById("gooseBtn").style.display="block";
    document.getElementById("gooseModal").style.display="flex";
  }
};

/* VIEW */
function setPattern(p){
  document.body.className="";
  if(p!=="none") document.body.classList.add("pattern-"+p);
}

function setScreen(s){
  let b=document.getElementById("bezel");
  b.classList.remove("wide","ultra");
  if(s==="wide") b.classList.add("wide");
  if(s==="ultra") b.classList.add("ultra");
}

function setFlavor(f){
  const map={
    citrus:{bar:"#ffcc33",bezel:"#cc9900",screen:"#332600",bg:"#1a1400"}
  };
  if(map[f]){
    document.documentElement.style.setProperty('--bar',map[f].bar);
    document.documentElement.style.setProperty('--bezel',map[f].bezel);
    document.documentElement.style.setProperty('--screen',map[f].screen);
    document.documentElement.style.setProperty('--bg',map[f].bg);
  }
}
</script>

</body>
</html>
