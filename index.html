<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Promptware Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bar:#111;
  --bezel:#1a1a1a;
  --screen:#000;
  --bg:#000;
  --text:#fff;
  --border:#333;
}

/* BACKGROUND */
body{
  margin:0;
  background:var(--bg);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:"Segoe UI","Apple Color Emoji","Segoe UI Emoji",system-ui,sans-serif;
  color:var(--text);
}

/* PATTERNS */
body.pattern-horizontal{background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-vertical{background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-diagonal{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 8px);}
body.pattern-dots{background-image:radial-gradient(circle,rgba(255,255,255,.05)1px,transparent 1px);background-size:12px 12px;}
body.pattern-chevron{
  background-image:
    linear-gradient(135deg, rgba(255,255,255,.04) 25%, transparent 25%),
    linear-gradient(225deg, rgba(255,255,255,.04) 25%, transparent 25%);
  background-size:16px 16px;
}

/* BEZEL */
.bezel{
  width:900px;
  max-width:95vw;
  height:85vh;
  margin-top:2vh;
  background:var(--bezel);
  border:2px solid var(--border);
  display:flex;
  flex-direction:column;
}
.bezel.wide{width:1100px;}
.bezel.ultra{width:95vw;}

/* MENU */
.menu-bar{
  background:var(--bar);
  display:flex;
  padding:6px 10px;
  font-size:14px;
  align-items:center;
}
.menu-item{
  margin-right:20px;
  cursor:pointer;
  position:relative;
}

/* LABEL */
.system-label{
  margin-left:auto;
  font-weight:bold;
  margin-right:10px;
  user-select:none;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:22px;
  left:0;
  background:var(--screen);
  border:1px solid var(--border);
  display:none;
  flex-direction:column;
  min-width:180px;
  z-index:20;
}
.dropdown div{
  display:flex;
  justify-content:space-between;
  padding:6px 8px;
  position:relative;
}
.dropdown div:hover{background:#222;}

/* SUBMENU */
.submenu{
  position:absolute;
  top:0;
  left:100%;
  display:none;
  flex-direction:column;
}
.dropdown div:hover > .submenu{display:flex;}

.check{opacity:0;}

/* EGG */
#egg{
  cursor:pointer;
  user-select:none;
}

/* TERMINAL */
#terminal{
  flex:1;
  background:var(--screen);
  padding:16px;
  overflow-y:auto;
  white-space:pre-wrap;
}

/* INPUT */
.input-bar{
  background:var(--screen);
  border-top:1px solid var(--border);
  padding:10px;
  display:flex;
  gap:8px;
}
textarea{
  flex:1;
  height:70px;
  resize:none;
  background:#111;
  color:#fff;
  border:1px solid var(--border);
  padding:8px;
  box-sizing:border-box;
}
button.send{
  width:80px;
  background:#fff;
  color:#000;
  border:none;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-content{
  background:var(--screen);
  border:1px solid var(--border);
  padding:15px;
  width:320px;
}
</style>
</head>

<body>

<div class="bezel" id="bezel">

<div class="menu-bar">

<div class="menu-item" onclick="toggleMenu('fileMenu')">File
  <div id="fileMenu" class="dropdown">
    <div onclick="loadPrompt('default')">Load</div>
    <div onclick="resetSession()">Reset</div>
  </div>
</div>

<div class="menu-item" onclick="toggleMenu('viewMenu')">View
  <div id="viewMenu" class="dropdown">

    <div>Flavors ▸
      <div class="submenu">
        <div onclick="setFlavor('vanilla')" data-flavor="vanilla"><span>Vanilla</span><span class="check">✓</span></div>
        <div onclick="setFlavor('mint')" data-flavor="mint"><span>Mint</span><span class="check">✓</span></div>
        <div onclick="setFlavor('cocoa')" data-flavor="cocoa"><span>Cocoa</span><span class="check">✓</span></div>
        <div onclick="setFlavor('berry')" data-flavor="berry"><span>Berry</span><span class="check">✓</span></div>
        <div onclick="setFlavor('melon')" data-flavor="melon"><span>Melon</span><span class="check">✓</span></div>
        <div onclick="setFlavor('citrus')" data-flavor="citrus"><span>Citrus</span><span class="check">✓</span></div>
      </div>
    </div>

    <div>Patterns ▸
      <div class="submenu">
        <div onclick="setPattern('none')" data-pattern="none"><span>None</span><span class="check">✓</span></div>
        <div onclick="setPattern('horizontal')" data-pattern="horizontal"><span>Horizontal</span><span class="check">✓</span></div>
        <div onclick="setPattern('vertical')" data-pattern="vertical"><span>Vertical</span><span class="check">✓</span></div>
        <div onclick="setPattern('diagonal')" data-pattern="diagonal"><span>Diagonal</span><span class="check">✓</span></div>
        <div onclick="setPattern('dots')" data-pattern="dots"><span>Dots</span><span class="check">✓</span></div>
        <div onclick="setPattern('chevron')" data-pattern="chevron"><span>Chevron</span><span class="check">✓</span></div>
      </div>
    </div>

    <div>Screen ▸
      <div class="submenu">
        <div onclick="setScreen('standard')" data-screen="standard"><span>Standard</span><span class="check">✓</span></div>
        <div onclick="setScreen('wide')" data-screen="wide"><span>Wide</span><span class="check">✓</span></div>
        <div onclick="setScreen('ultra')" data-screen="ultra"><span>Ultrawide</span><span class="check">✓</span></div>
      </div>
    </div>

  </div>
</div>

<div class="menu-item" onclick="toggleMenu('helpMenu')">Help
  <div id="helpMenu" class="dropdown">
    <div onclick="showNotice(true)">About</div>
  </div>
</div>

<div class="system-label">566335006</div>
<div id="egg">🥚</div>

</div>

<div id="terminal"></div>

<div class="input-bar">
<textarea id="input" disabled placeholder="Load a prompt to begin…"></textarea>
<button class="send" onclick="send()">Send</button>
</div>

</div>

<script>
/* MENU */
function toggleMenu(id){
  const el=document.getElementById(id);
  if(el.style.display==="flex"){el.style.display="none";}
  else{closeMenus();el.style.display="flex";}
}
function closeMenus(){
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.menu-bar')) closeMenus();
});

/* TERMINAL */
function appendUser(text){
  const el=document.getElementById("terminal");
  el.innerHTML += `<div style="text-align:right;font-style:italic;">${text}</div>`;
}
function appendLLM(text){
  const el=document.getElementById("terminal");
  el.innerHTML += `<div style="text-align:left;">${text}</div>`;
}

/* INPUT */
function send(){
  const input=document.getElementById("input");
  if(input.disabled) return;
  appendUser(input.value);
  appendLLM("...");
  input.value="";
}

/* STATE */
let currentFlavor="vanilla";
let currentPattern="none";
let currentScreen="standard";

/* FLAVOR */
function setFlavor(f){
  const map={
    vanilla:{bar:"#111",bezel:"#1a1a1a",screen:"#000",bg:"#000"},
    mint:{bar:"#052a1c",bezel:"#0b3f2c",screen:"#102f22",bg:"#02150d"},
    cocoa:{bar:"#2a1605",bezel:"#3f260b",screen:"#2f1f10",bg:"#140a02"},
    berry:{bar:"#051a2a",bezel:"#0b2a3f",screen:"#10222f",bg:"#020c15"},
    melon:{bar:"#2a0510",bezel:"#3f0b1f",screen:"#2f1018",bg:"#15020a"},
    citrus:{bar:"#665200",bezel:"#998000",screen:"#332900",bg:"#1a1400"}
  };

  document.documentElement.style.setProperty('--bar',map[f].bar);
  document.documentElement.style.setProperty('--bezel',map[f].bezel);
  document.documentElement.style.setProperty('--screen',map[f].screen);
  document.documentElement.style.setProperty('--bg',map[f].bg);
}

/* PATTERN */
function setPattern(p){
  document.body.className="";
  if(p!=="none") document.body.classList.add("pattern-"+p);
}

/* SCREEN */
function setScreen(s){
  const b=document.getElementById("bezel");
  b.classList.remove("wide","ultra");
  if(s==="wide") b.classList.add("wide");
  if(s==="ultra") b.classList.add("ultra");
}

/* LOAD */
function loadPrompt(name){
  appendLLM("Prompt loaded.");
  const input=document.getElementById("input");
  input.disabled=false;
  input.placeholder="Type to interact…";
}

/* RESET */
function resetSession(){
  document.getElementById("terminal").innerHTML="";
  const input=document.getElementById("input");
  input.disabled=true;
  input.placeholder="Load a prompt to begin…";
}

/* NOTICE */
function showNotice(force=false){
  if(localStorage.getItem("seen") && !force) return;
  alert("Do not enter personal info.");
}

/* EGG */
let clicks=0;
document.getElementById("egg").onclick=()=>{
  clicks++;
  if(clicks===99){
    appendLLM("Goose Sweeper unlocked.");
  }
};
</script>

</body>
</html>
