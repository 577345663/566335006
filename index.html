<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Promptware Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bar:#111;
  --bezel:#1a1a1a;
  --screen:#000;
  --bg:#000;
  --text:#fff;
  --border:#333;
}

body{
  margin:0;
  background:var(--bg);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:"Segoe UI","Apple Color Emoji","Segoe UI Emoji",system-ui,sans-serif;
  color:var(--text);
}

/* PATTERNS */
body.pattern-horizontal{background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-vertical{background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-diagonal{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 8px);}
body.pattern-dots{background-image:radial-gradient(circle,rgba(255,255,255,.05)1px,transparent 1px);background-size:12px 12px;}
body.pattern-chevron{
  background-image:
    linear-gradient(135deg, rgba(255,255,255,.04) 25%, transparent 25%),
    linear-gradient(225deg, rgba(255,255,255,.04) 25%, transparent 25%);
  background-size:16px 16px;
}

/* BEZEL */
.bezel{
  width:900px;
  max-width:95vw;
  height:85vh;
  margin-top:2vh;
  background:var(--bezel);
  border:2px solid var(--border);
  display:flex;
  flex-direction:column;
}
.bezel.wide{width:1100px;}
.bezel.ultra{width:95vw;}

/* MENU */
.menu-bar{
  background:var(--bar);
  display:flex;
  padding:6px 10px;
  font-size:14px;
  align-items:center;
}

.menu-item{
  margin-right:20px;
  cursor:pointer;
  position:relative;
}

.system-label{
  margin-left:auto;
  font-weight:bold;
  margin-right:10px;
  user-select:none;
}

.dropdown{
  position:absolute;
  top:22px;
  left:0;
  background:var(--screen);
  border:1px solid var(--border);
  display:none;
  flex-direction:column;
  min-width:180px;
  z-index:50;
}

.dropdown > div{
  padding:6px 8px;
  cursor:pointer;
  white-space:nowrap;
}

.dropdown > div:hover{background:#222;}

.submenu{
  position:absolute;
  top:0;
  left:100%;
  display:none;
  flex-direction:column;
  background:var(--screen);
  border:1px solid var(--border);
}

.dropdown > div:hover > .submenu{
  display:flex;
}

.check{opacity:0;}

/* TERMINAL */
#terminal{
  flex:1;
  background:var(--screen);
  padding:16px;
  overflow-y:auto;
}

/* INPUT */
.input-bar{
  display:flex;
  gap:8px;
  padding:10px;
  border-top:1px solid var(--border);
}
textarea{
  flex:1;
  height:70px;
  resize:none;
  background:#111;
  color:#fff;
  border:1px solid var(--border);
  padding:8px;
}
button.send{
  width:80px;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:var(--screen);
  border:1px solid var(--border);
  padding:15px;
  width:300px;
}
</style>
</head>

<body>

<div class="bezel" id="bezel">

<div class="menu-bar">

<div class="menu-item" onclick="toggleMenu('fileMenu')">File
  <div id="fileMenu" class="dropdown">
    <div onclick="openLoadModal()">Load</div>
    <div onclick="resetSession()">Reset</div>
  </div>
</div>

<div class="menu-item" onclick="toggleMenu('viewMenu')">View
  <div id="viewMenu" class="dropdown">

    <div>Flavors ▶
      <div class="submenu">
        <div onclick="setFlavor('vanilla')">Vanilla</div>
        <div onclick="setFlavor('mint')">Mint</div>
        <div onclick="setFlavor('cocoa')">Cocoa</div>
        <div onclick="setFlavor('berry')">Berry</div>
        <div onclick="setFlavor('melon')">Melon</div>
        <div onclick="setFlavor('citrus')">Citrus</div>
      </div>
    </div>

    <div>Patterns ▶
      <div class="submenu">
        <div onclick="setPattern('none')">None</div>
        <div onclick="setPattern('horizontal')">Horizontal</div>
        <div onclick="setPattern('vertical')">Vertical</div>
        <div onclick="setPattern('diagonal')">Diagonal</div>
        <div onclick="setPattern('dots')">Dots</div>
        <div onclick="setPattern('chevron')">Chevron</div>
      </div>
    </div>

    <div>Screen ▶
      <div class="submenu">
        <div onclick="setScreen('standard')">Standard</div>
        <div onclick="setScreen('wide')">Wide</div>
        <div onclick="setScreen('ultra')">Ultrawide</div>
      </div>
    </div>

  </div>
</div>

<div class="menu-item" onclick="showNotice()">Help</div>

<div class="system-label">566335006</div>
<div id="egg">🥚</div>

</div>

<div id="terminal"></div>

<div class="input-bar">
<textarea id="input" disabled placeholder="Load a prompt to begin…"></textarea>
<button class="send" onclick="send()">Send</button>
</div>

</div>

<!-- LOAD MODAL -->
<div id="loadModal" class="modal">
  <div class="modal-content">
    <div>Select Prompt</div>
    <button onclick="loadPrompt('default')">Default Prompt</button>
    <button id="gooseBtn" style="display:none;" onclick="loadPrompt('goose')">Goose Sweeper</button>
    <button onclick="closeModal('loadModal')">Close</button>
  </div>
</div>

<!-- NOTICE MODAL -->
<div id="noticeModal" class="modal">
  <div class="modal-content">
    <div>Do not enter personal info.</div>
    <label><input type="checkbox" id="dontShow"> Don't show again</label>
    <button onclick="dismissNotice()">Continue</button>
  </div>
</div>

<script>
/* MENU */
function toggleMenu(id){
  const el=document.getElementById(id);
  el.style.display=el.style.display==="flex"?"none":"flex";
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.menu-bar')){
    document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
  }
});

/* MODALS */
function openLoadModal(){
  document.getElementById("loadModal").style.display="flex";
}
function closeModal(id){
  document.getElementById(id).style.display="none";
}

/* NOTICE */
function showNotice(){
  if(localStorage.getItem("seen")) return;
  document.getElementById("noticeModal").style.display="flex";
}
function dismissNotice(){
  if(document.getElementById("dontShow").checked){
    localStorage.setItem("seen","1");
  }
  closeModal("noticeModal");
}
showNotice();

/* TERMINAL */
function appendUser(text){
  document.getElementById("terminal").innerHTML += `<div style="text-align:right;">${text}</div>`;
}
function appendLLM(text){
  document.getElementById("terminal").innerHTML += `<div>${text}</div>`;
}

function send(){
  const input=document.getElementById("input");
  if(input.disabled) return;
  appendUser(input.value);
  appendLLM("...");
  input.value="";
}

/* LOAD */
function loadPrompt(name){
  closeModal("loadModal");
  appendLLM(name==="goose"?"Goose Sweeper started.":"Prompt loaded.");
  document.getElementById("input").disabled=false;
}

/* RESET */
function resetSession(){
  document.getElementById("terminal").innerHTML="";
  const input=document.getElementById("input");
  input.disabled=true;
}

/* EGG */
let clicks=0;
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function tap(){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.frequency.value=700;
  g.gain.value=0.03;
  o.connect(g).connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),25);
}

function whack(){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.frequency.value=120;
  g.gain.value=0.1;
  o.connect(g).connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

document.getElementById("egg").onclick=()=>{
  if(ctx.state==="suspended") ctx.resume();
  clicks++;
  tap();
  if(clicks===99){
    whack();
    document.getElementById("gooseBtn").style.display="block";
    openLoadModal();
  }
};

/* VIEW */
function setFlavor(f){
  const map={
    citrus:{bar:"#ffcc33",bezel:"#cc9900",screen:"#332600",bg:"#1a1400"}
  };
  if(map[f]){
    document.documentElement.style.setProperty('--bar',map[f].bar);
    document.documentElement.style.setProperty('--bezel',map[f].bezel);
    document.documentElement.style.setProperty('--screen',map[f].screen);
    document.documentElement.style.setProperty('--bg',map[f].bg);
  }
}
function setPattern(p){
  document.body.className="";
  if(p!=="none") document.body.classList.add("pattern-"+p);
}
function setScreen(s){
  const b=document.getElementById("bezel");
  b.classList.remove("wide","ultra");
  if(s==="wide") b.classList.add("wide");
  if(s==="ultra") b.classList.add("ultra");
}
</script>

</body>
</html>
