<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Promptware Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bar:#111;
  --bezel:#1a1a1a;
  --screen:#000;
  --bg:#000;
  --text:#fff;
  --border:#333;
}

body{
  margin:0;
  background:var(--bg);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:"Segoe UI","Apple Color Emoji","Segoe UI Emoji",system-ui,sans-serif;
  color:var(--text);
}

/* PATTERNS */
body.pattern-horizontal{background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-vertical{background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 6px);}
body.pattern-diagonal{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.05)0px,rgba(255,255,255,.05)1px,transparent 1px,transparent 8px);}
body.pattern-dots{background-image:radial-gradient(circle,rgba(255,255,255,.05)1px,transparent 1px);background-size:12px 12px;}
body.pattern-chevron{
  background-image:
    linear-gradient(135deg, rgba(255,255,255,.04) 25%, transparent 25%),
    linear-gradient(225deg, rgba(255,255,255,.04) 25%, transparent 25%);
  background-size:16px 16px;
}

/* BEZEL */
.bezel{
  width:900px;
  max-width:95vw;
  height:85vh;
  margin-top:2vh;
  background:var(--bezel);
  border:2px solid var(--border);
  display:flex;
  flex-direction:column;
}

.bezel.wide{width:1100px;}
.bezel.ultra{width:95vw;}

/* MENU */
.menu-bar{
  background:var(--bar);
  display:flex;
  padding:6px 10px;
  font-size:14px;
  align-items:center;
}

.menu-item{
  margin-right:20px;
  cursor:pointer;
  position:relative;
}

/* RIGHT LABEL */
.system-label{
  margin-left:auto;
  font-weight:bold;
  margin-right:10px;
  user-select:none;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:22px;
  left:0;
  background:var(--screen);
  border:1px solid var(--border);
  display:none;
  flex-direction:column;
  min-width:180px;
  z-index:20;
}

.dropdown div{
  display:flex;
  justify-content:space-between;
  padding:6px 8px;
  position:relative;
}
.dropdown div:hover{background:#222;}

.submenu{
  position:absolute;
  top:0;
  left:100%;
  display:none;
  flex-direction:column;
}

.dropdown div:hover > .submenu{
  display:flex;
}

.check{opacity:0;}

/* EGG (FIXED CLICKABLE) */
#egg{
  cursor:pointer;
  user-select:none;
  pointer-events:auto;
}

/* TERMINAL */
#terminal{
  flex:1;
  background:var(--screen);
  padding:16px;
  overflow-y:auto;
  white-space:pre-wrap;
}

/* INPUT */
.input-bar{
  background:var(--screen);
  border-top:1px solid var(--border);
  padding:10px;
}

textarea{
  width:100%;
  height:70px;
  resize:none;
  background:#111;
  color:#fff;
  border:1px solid var(--border);
  padding:8px;
  box-sizing:border-box;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:var(--screen);
  border:1px solid var(--border);
  padding:15px;
  width:320px;
}

.btn{
  width:100%;
  margin-top:8px;
  padding:8px;
  background:#fff;
  color:#000;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="bezel" id="bezel">

<div class="menu-bar">

<div class="menu-item" onclick="toggleMenu('fileMenu')">File
  <div id="fileMenu" class="dropdown">
    <div onclick="openFile()">Load</div>
    <div onclick="resetSession()">Reset</div>
  </div>
</div>

<div class="menu-item" onclick="toggleMenu('viewMenu')">View
  <div id="viewMenu" class="dropdown">

    <div>Flavors ▸
      <div class="submenu">
        <div onclick="setFlavor('vanilla')" data-flavor="vanilla"><span>Vanilla</span><span class="check">✓</span></div>
        <div onclick="setFlavor('mint')" data-flavor="mint"><span>Mint</span><span class="check">✓</span></div>
        <div onclick="setFlavor('cocoa')" data-flavor="cocoa"><span>Cocoa</span><span class="check">✓</span></div>
        <div onclick="setFlavor('berry')" data-flavor="berry"><span>Berry</span><span class="check">✓</span></div>
        <div onclick="setFlavor('melon')" data-flavor="melon"><span>Melon</span><span class="check">✓</span></div>
        <div onclick="setFlavor('citrus')" data-flavor="citrus"><span>Citrus</span><span class="check">✓</span></div>
      </div>
    </div>

    <div>Patterns ▸
      <div class="submenu">
        <div onclick="setPattern('none')" data-pattern="none"><span>None</span><span class="check">✓</span></div>
        <div onclick="setPattern('horizontal')" data-pattern="horizontal"><span>Horizontal</span><span class="check">✓</span></div>
        <div onclick="setPattern('vertical')" data-pattern="vertical"><span>Vertical</span><span class="check">✓</span></div>
        <div onclick="setPattern('diagonal')" data-pattern="diagonal"><span>Diagonal</span><span class="check">✓</span></div>
        <div onclick="setPattern('dots')" data-pattern="dots"><span>Dots</span><span class="check">✓</span></div>
        <div onclick="setPattern('chevron')" data-pattern="chevron"><span>Chevron</span><span class="check">✓</span></div>
      </div>
    </div>

    <div>Screen ▸
      <div class="submenu">
        <div onclick="setScreen('standard')" data-screen="standard"><span>Standard</span><span class="check">✓</span></div>
        <div onclick="setScreen('wide')" data-screen="wide"><span>Wide</span><span class="check">✓</span></div>
        <div onclick="setScreen('ultra')" data-screen="ultra"><span>Ultrawide</span><span class="check">✓</span></div>
      </div>
    </div>

  </div>
</div>

<div class="menu-item" onclick="toggleMenu('helpMenu')">Help
  <div id="helpMenu" class="dropdown">
    <div onclick="showNotice(true)">About</div>
  </div>
</div>

<div class="system-label">566335006</div>
<div id="egg">🥚</div>

</div>

<div id="terminal">566335006</div>

<div class="input-bar">
<textarea id="input" disabled placeholder="Load a prompt to begin…" onkeydown="handleInput(event)"></textarea>
</div>

</div>

<!-- NOTICE -->
<div id="notice" class="modal">
  <div class="modal-content">
    <strong>Notice</strong>
    <p>Do not enter personal info. Outputs may vary.</p>
    <label><input type="checkbox" id="dontShow"> Don't show again</label>
    <button class="btn" onclick="dismissNotice()">Continue</button>
  </div>
</div>

<script>
/* MENU */
function toggleMenu(id){
  const el=document.getElementById(id);
  if(el.style.display==="flex"){
    el.style.display="none";
  } else {
    closeMenus();
    el.style.display="flex";
  }
}
function closeMenus(){
  document.querySelectorAll('.dropdown').forEach(d=>d.style.display='none');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.menu-bar')) closeMenus();
});

/* TERMINAL */
function append(t){
  const el=document.getElementById("terminal");
  el.textContent+="\n"+t;
  el.scrollTop=el.scrollHeight;
}

function handleInput(e){
  const input=document.getElementById("input");
  if(input.disabled) return;

  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    append("> "+e.target.value);
    append("...");
    e.target.value="";
  }
}

/* STATE */
let currentFlavor="vanilla";
let currentPattern="none";
let currentScreen="standard";

/* FLAVOR */
function setFlavor(f){
  currentFlavor=f;

  const map={
    vanilla:{bar:"#111",bezel:"#1a1a1a",screen:"#000",bg:"#000"},
    mint:{bar:"#052a1c",bezel:"#0b3f2c",screen:"#102f22",bg:"#02150d"},
    cocoa:{bar:"#2a1605",bezel:"#3f260b",screen:"#2f1f10",bg:"#140a02"},
    berry:{bar:"#051a2a",bezel:"#0b2a3f",screen:"#10222f",bg:"#020c15"},
    melon:{bar:"#2a0510",bezel:"#3f0b1f",screen:"#2f1018",bg:"#15020a"},
    citrus:{bar:"#3a2a00",bezel:"#5a3f00",screen:"#2a2000",bg:"#120d00"}
  };

  document.documentElement.style.setProperty('--bar',map[f].bar);
  document.documentElement.style.setProperty('--bezel',map[f].bezel);
  document.documentElement.style.setProperty('--screen',map[f].screen);
  document.documentElement.style.setProperty('--bg',map[f].bg);

  updateChecks();
}

/* PATTERN */
function setPattern(p){
  currentPattern=p;
  document.body.className="";
  if(p!=="none") document.body.classList.add("pattern-"+p);
  updateChecks();
}

/* SCREEN */
function setScreen(s){
  currentScreen=s;
  const b=document.getElementById("bezel");
  b.classList.remove("wide","ultra");
  if(s==="wide") b.classList.add("wide");
  if(s==="ultra") b.classList.add("ultra");
  updateChecks();
}

/* CHECKS */
function updateChecks(){
  document.querySelectorAll('[data-flavor]').forEach(el=>{
    el.querySelector('.check').style.opacity=(el.dataset.flavor===currentFlavor)?1:0;
  });
  document.querySelectorAll('[data-pattern]').forEach(el=>{
    el.querySelector('.check').style.opacity=(el.dataset.pattern===currentPattern)?1:0;
  });
  document.querySelectorAll('[data-screen]').forEach(el=>{
    el.querySelector('.check').style.opacity=(el.dataset.screen===currentScreen)?1:0;
  });
}

/* LOAD */
function openFile(){
  append("\nPrompt loaded.");
  const input=document.getElementById("input");
  input.disabled=false;
  input.placeholder="Type to interact…";
}

/* RESET */
function resetSession(){
  document.getElementById("terminal").textContent="566335006";
  const input=document.getElementById("input");
  input.disabled=true;
  input.placeholder="Load a prompt to begin…";
}

/* NOTICE */
function showNotice(force=false){
  if(localStorage.getItem("seen") && !force) return;
  document.getElementById("notice").style.display="flex";
}
function dismissNotice(){
  if(document.getElementById("dontShow").checked){
    localStorage.setItem("seen","1");
  }
  document.getElementById("notice").style.display="none";
}
showNotice();

/* EGG FIXED */
let clicks=0;
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function tap(){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=700;
  g.gain.value=0.03;
  o.connect(g).connect(audioCtx.destination);
  o.start();
  setTimeout(()=>o.stop(),25);
}

function whack(){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.frequency.value=120;
  g.gain.value=0.1;
  o.connect(g).connect(audioCtx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

document.getElementById("egg").addEventListener("click",(e)=>{
  e.stopPropagation();
  if(audioCtx.state==="suspended") audioCtx.resume();

  clicks++;

  if(clicks<99){
    tap();
  }else{
    whack();
    clicks=0;
    append("\nHidden unlocked.");
  }
});

/* INIT */
updateChecks();
</script>

</body>
</html>
